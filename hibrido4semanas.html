<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Híbrido 4W">
<meta name="theme-color" content="#000000">
<title>⚡ Híbrido 4 Semanas</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text',sans-serif;background:#000;color:#fff;max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden;}
  button{font-family:inherit;cursor:pointer;}
  ::-webkit-scrollbar{display:none;}

  /* Layout */
  #app{display:flex;flex-direction:column;height:100dvh;}
  #statusbar{padding:env(safe-area-inset-top,14px) 20px 4px;background:#000;display:flex;justify-content:space-between;font-size:13px;font-weight:600;flex-shrink:0;}
  #header{padding:4px 20px 0;background:#000;flex-shrink:0;}
  #content{flex:1;overflow-y:auto;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 80px);}
  #tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(0,0,0,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid #1C1C1E;padding:8px 0 calc(env(safe-area-inset-bottom,16px) + 8px);display:flex;justify-content:space-around;z-index:100;}

  /* Tab bar buttons */
  .tab-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 16px;}
  .tab-btn .tab-emoji{font-size:22px;}
  .tab-btn .tab-label{font-size:10px;font-weight:600;}

  /* Cards */
  .card{background:#1C1C1E;border-radius:16px;padding:14px 16px;margin-bottom:10px;}
  .card-left{border-left:4px solid;}

  /* Week selector */
  .week-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 16px;}
  .week-btn{padding:14px;border-radius:16px;border:2px solid #1C1C1E;background:#1C1C1E;text-align:left;transition:all .2s;}
  .week-btn.active{border-color:var(--c)!important;background:color-mix(in srgb,var(--c) 15%,transparent)!important;}
  .week-label{font-size:10px;color:#8E8E93;margin-bottom:2px;}
  .week-name{font-size:15px;font-weight:700;}

  /* Day list */
  .day-list{display:flex;flex-direction:column;gap:10px;padding:0 16px;}
  .day-btn{background:#1C1C1E;border-radius:16px;padding:14px 16px;border:none;display:flex;align-items:center;gap:14px;width:100%;text-align:left;}
  .day-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
  .day-chevron{color:#3A3A3C;font-size:18px;margin-left:auto;}

  /* Tags */
  .tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}

  /* Detail */
  .ex-card{background:#000;border-radius:14px;padding:12px 14px;margin-bottom:8px;border-left:3px solid;}
  .ex-row{display:flex;justify-content:space-between;align-items:center;}
  .ex-note{font-size:12px;color:#8E8E93;margin-top:3px;}
  .tip-card{background:#1C1C1E;border-radius:14px;padding:12px 14px;margin:12px 16px;border-left:3px solid #FF9500;}

  /* Circadiano grid */
  .cron-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 16px;}
  .cron-cell{background:#1C1C1E;border-radius:14px;padding:12px 14px;}

  /* Nutrición */
  .nut-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}

  /* Back btn */
  .back-btn{background:none;border:none;color:#007AFF;font-size:17px;padding:0 16px 12px;display:flex;align-items:center;gap:4px;}
</style>
</head>
<body>
<div id="app">
  <div id="statusbar">
    <span id="clock">9:41</span>
    <span>●●● 📶 🔋</span>
  </div>
  <div id="header">
    <div id="header-inner" style="padding-bottom:8px;">
      <h1 style="font-size:28px;font-weight:800;letter-spacing:-0.5px;">⚡ Híbrido 4W</h1>
      <p style="font-size:13px;color:#8E8E93;margin-top:2px;">Fuerza · HIIT · LISS · Movilidad</p>
    </div>
  </div>
  <div id="content"></div>
  <div id="tabbar">
    <button class="tab-btn" onclick="switchTab('programa')">
      <span class="tab-emoji">📋</span>
      <span class="tab-label" id="tl-programa" style="color:#007AFF">Programa</span>
    </button>
    <button class="tab-btn" onclick="switchTab('circadiano')">
      <span class="tab-emoji">🕐</span>
      <span class="tab-label" id="tl-circadiano" style="color:#8E8E93">Circadiano</span>

      <span class="tab-label" id="tl-nutricion" style="color:#8E8E93">Nutrición</span>
    </button>
  </div>
</div>

// ─── STATE ────────────────────────────────────────────────────────────
let state = { tab:"programa", semana:1, dia:null, cronotipo:"mañana" };

// ─── UTILS ────────────────────────────────────────────────────────────
function tag(tipo, color) {
  return `<span class="tag" style="background:${color}22;color:${color};border:1px solid ${color}44;">${tipo}</span>`;
}

// ─── RENDERS ──────────────────────────────────────────────────────────
function renderHeader() {
  const h = document.getElementById('header-inner');
  if (state.tab === 'programa' && state.dia !== null) {
    h.innerHTML = `<button class="back-btn" onclick="goBack()">‹ Semana ${state.semana}</button>`;
  } else {
    h.innerHTML = `<h1 style="font-size:28px;font-weight:800;letter-spacing:-0.5px;">⚡ Híbrido 4W</h1><p style="font-size:13px;color:#8E8E93;margin-top:2px;">Fuerza · HIIT · LISS · Movilidad</p>`;
  }
}

function renderTabBar() {
  ['programa','circadiano','nutricion'].forEach(t => {
    document.getElementById('tl-' + t).style.color = state.tab === t ? '#007AFF' : '#8E8E93';
  });
}

function renderPrograma() {
  const sem = PROGRAMA[state.semana];
  if (state.dia !== null) {
    renderDia(sem.dias[state.dia]);
    return;
  }
  const semColor = SEMANAS[state.semana-1].color;
  let html = `<div class="week-grid">`;
  SEMANAS.forEach(s => {
    const active = state.semana === s.id ? 'active' : '';
    html += `<button class="week-btn ${active}" style="--c:${s.color}" onclick="selectSemana(${s.id})">
      <div class="week-label">Semana ${s.id}</div>
      <div class="week-name" style="color:${state.semana===s.id?s.color:'#fff'}">${s.label}</div>
    </button>`;
  });
  html += `</div>
  <div style="margin:0 16px 16px;">
    <div class="card card-left" style="border-color:${semColor}">
      <div style="font-size:12px;color:#8E8E93">${sem.sub}</div>
    </div>
  </div>
  <div class="day-list">`;
  sem.dias.forEach((d, i) => {
    html += `<button class="day-btn" onclick="selectDia(${i})">
      <div class="day-icon" style="background:${d.color}22">${d.emoji}</div>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-size:15px;font-weight:600">${d.dia} — ${d.nombre}</span>
          ${tag(d.tipo, d.color)}
        </div>
        <div style="font-size:12px;color:#8E8E93">⏱ ${d.dur} · ${d.exs.filter(e=>e.s).length} ejercicios</div>
      </div>
      <span class="day-chevron">›</span>
    </button>`;
  });
  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}

function renderDia(d) {
  let html = `<div style="padding:0 16px;">
    <div class="card" style="margin:12px 0 16px;border:1px solid ${d.color}44">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:56px;height:56px;border-radius:16px;background:${d.color}22;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0">${d.emoji}</div>
        <div>
          <div style="font-size:18px;font-weight:700">${d.nombre}</div>
          <div style="display:flex;gap:8px;margin-top:4px;align-items:center">
            ${tag(d.tipo, d.color)}
            <span style="font-size:12px;color:#8E8E93">⏱ ${d.dur}</span>
          </div>
        </div>
      </div>
    </div>`;
  d.exs.forEach(ex => {
    if (!ex.n) return;
    html += `<div class="ex-card" style="border-color:${d.color}">
      <div class="ex-row">
        <span style="font-size:14px;font-weight:600">${ex.n}</span>
        ${ex.s ? `<span style="font-size:13px;color:${d.color};font-weight:700">${ex.s}</span>` : ''}
      </div>
      ${ex.nota ? `<div class="ex-note">💡 ${ex.nota}</div>` : ''}
    </div>`;
  });
  if (d.tip) {
    html += `<div class="tip-card">
      <div style="font-size:12px;color:#FF9500;font-weight:600">⭐ Tip del día</div>
      <div style="font-size:13px;color:#E5E5EA;margin-top:4px">${d.tip}</div>
    </div>`;
  }
  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}

function renderCircadiano() {
  const ct = CIRCADIANO[state.cronotipo];
  let html = `<div style="padding:0 16px;">
    <div style="display:flex;gap:8px;margin:12px 0 16px">`;
  ['mañana','noche'].forEach(c => {
    const active = state.cronotipo === c;
    html += `<button onclick="selectCronotipo('${c}')" style="flex:1;padding:12px;border-radius:14px;border:none;background:${active?'#007AFF':'#1C1C1E'};color:${active?'#fff':'#8E8E93'};font-size:15px;font-weight:700;cursor:pointer">${CIRCADIANO[c].label}</button>`;
  });
  html += `</div><div class="cron-grid">`;
  const items = [
    {l:"Despertar",v:ct.despertar,e:"⏰",c:"#fff"},
    {l:"Pico hormonal 1",v:ct.pico1,e:"🚀",c:"#34C759"},
    {l:"LISS ideal",v:ct.liss,e:"🚶",c:"#34C759"},
    {l:"HIIT ideal",v:ct.hiit,e:"⚡",c:"#FF3B30"},
    {l:"Fuerza ideal",v:ct.fuerza,e:"💪",c:"#007AFF"},
    {l:"Movilidad",v:ct.movilidad,e:"🧘",c:"#FF9500"},
    {l:"Pico hormonal 2",v:ct.pico2,e:"🔁",c:"#34C759"},
    {l:"Dormir",v:ct.dormir,e:"😴",c:"#AF52DE"},
  ];
  items.forEach(item => {
    html += `<div class="cron-cell">
      <div style="font-size:11px;color:#8E8E93">${item.e} ${item.l}</div>
      <div style="font-size:14px;font-weight:700;color:${item.c};margin-top:4px">${item.v}</div>
    </div>`;
  });
  html += `</div>`;
  const ciencia = [
    {t:"🧬 Cortisol y Testosterona",b:"El cortisol pica 30–60 min tras despertar (CAR response). El entrenamiento de fuerza en tarde aprovecha el pico anabólico de testosterona para mayor síntesis muscular.",c:"#FF3B30"},
    {t:"🌡️ Temperatura y Rendimiento",b:"La temperatura corporal máxima ocurre entre las 16:00–20:00. Fuerza, VO2max y velocidad de reacción son óptimos. El HIIT en esta franja puede mejorar el rendimiento hasta un 8%.",c:"#FF9500"},
    {t:"💤 Melatonina y Sueño",b:"La melatonina sube 2h antes de dormir. HIIT nocturno intenso la suprime y fragmenta el sueño. LISS en Zona 1 no tiene este efecto negativo.",c:"#AF52DE"},
    {t:"⚡ Sensibilidad a la Insulina",b:"Máxima por la mañana. Los carbos matutinos se procesan con mayor eficiencia. Por la noche prioriza proteína y grasas saludables sobre carbohidratos.",c:"#34C759"},
  ];
  ciencia.forEach(card => {
    html += `<div class="card card-left" style="border-color:${card.c};margin-bottom:10px">
      <div style="font-size:14px;font-weight:700;margin-bottom:6px">${card.t}</div>
      <div style="font-size:12px;color:#8E8E93;line-height:1.6">${card.b}</div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}

function renderNutricion() {
  let html = `<div style="padding:12px 16px 0">`;
  NUTRICION.forEach(card => {
    html += `<div class="card card-left" style="border-color:${card.c}">
      <div style="margin-bottom:10px">
        <div style="font-size:15px;font-weight:700">${card.t}</div>
        <div style="font-size:12px;color:#8E8E93;margin-top:2px">${card.sub}</div>
      </div>`;
    card.items.forEach(item => {
      html += `<div style="display:flex;gap:8px;margin-bottom:6px;align-items:flex-start">
        <div class="nut-dot" style="background:${card.c};margin-top:5px"></div>
        <span style="font-size:13px;color:#E5E5EA;line-height:1.5">${item}</span>
      </div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}

// ─── ACTIONS ──────────────────────────────────────────────────────────
function switchTab(t) {
  state.tab = t; state.dia = null;
  renderHeader(); renderTabBar(); render();
  document.getElementById('content').scrollTop = 0;
}
function selectSemana(n) { state.semana = n; state.dia = null; render(); }
function selectDia(i) { state.dia = i; renderHeader(); render(); document.getElementById('content').scrollTop = 0; }
function goBack() { state.dia = null; renderHeader(); render(); }
function selectCronotipo(c) { state.cronotipo = c; render(); }

function render() {
  if (state.tab === 'programa') renderPrograma();
  else if (state.tab === 'circadiano') renderCircadiano();
  else renderNutricion();
}

// ─── CLOCK ────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}`;
}
setInterval(updateClock, 10000);
updateClock();

// ─── INIT ─────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
